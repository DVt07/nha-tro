<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="page-container">
        <header>
            <h1>Đăng nhập</h1>
            <p>Đăng nhập bằng Google, Facebook hoặc tài khoản ảo dùng thử.</p>
        </header>   

        <main>
            <section class="auth-card">
                <div class="social-login">
                    <button class="social-button google">Đăng nhập với Google</button>
                    <button class="social-button facebook">Đăng nhập với Facebook</button>
                </div>

                <div class="separator"><span>hoặc</span></div>

                <form class="login-form">
                    <label>
                        Email hoặc số điện thoại
                        <input type="text" placeholder="vd: user@example.com">
                    </label>
                    <label>
                        Mật khẩu
                        <input type="password" placeholder="Mật khẩu">
                    </label>
                    <button class="button primary" type="submit">Đăng nhập</button>
                </form>

                
            </section>
        </main>

        <footer>
            <p>Chưa có tài khoản? Bạn có thể dùng tài khoản ảo hoặc quay lại trang chính.</p>
        </footer>
    </div>
</body>
</html>
