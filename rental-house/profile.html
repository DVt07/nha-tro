<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="page-container">
        <header>
            <h1>Hồ sơ cá nhân</h1>
            <p>Quản lý thông tin tài khoản và các hành động bảo mật.</p>
        </header>

        <main>
            <section class="profile-card">
                <div class="profile-header">
                    <div class="avatar-placeholder">A</div>
                    <div>
                        <h2>Nguyễn Văn A</h2>
                        <p>user@example.com</p>
                    </div>
                </div>

                <div class="profile-details">
                    <div class="profile-row"><span>Full Name</span><strong>Nguyễn Văn A</strong></div>
                    <div class="profile-row"><span>Email</span><strong>user@example.com</strong></div>
                    <div class="profile-row"><span>Phone</span><strong>0912 345 678</strong></div>
                    <div class="profile-row"><span>Birthday</span><strong>01/01/1990</strong></div>
                </div>

                <div class="profile-actions">
                    <button class="button secondary" type="button">Chỉnh sửa hồ sơ</button>
                    <button class="button" type="button">Đổi mật khẩu</button>
                    <button class="button danger" type="button">Đăng xuất</button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
