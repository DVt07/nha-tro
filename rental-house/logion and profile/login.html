<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="page-container">
        <header>
            <h1>Đăng nhập</h1>
            <p>Đăng nhập bằng Google, Facebook hoặc tài khoản hiện có.</p>
            <p style="margin-top:8px;"><a class="text-link" href="../index.html">← Quay về trang chủ</a></p>
        </header>

        <main>
            <section class="auth-card">
                <div class="social-login">
                    <button class="social-button google">Đăng nhập với Google</button>
                    <button class="social-button facebook">Đăng nhập với Facebook</button>
                </div>

                <div class="separator"><span>hoặc</span></div>

                <form class="login-form">
                    <label class="form-field">
                        Username hoặc Email
                        <input type="text" placeholder="Username hoặc email">
                    </label>
                    <label class="form-field">
                        Mật khẩu
                        <input type="password" placeholder="Mật khẩu">
                    </label>
                    <div class="form-footer">
                        <a class="text-link" href="#">Quên mật khẩu?</a>
                    </div>
                    <button class="button primary" type="submit">Đăng nhập</button>
                </form>
            </section>
        </main>

        <footer>
            <p>Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
        </footer>
    </div>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
