<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="page-container">
        <header>
            <h1>Đăng ký</h1>
            <p>Tạo tài khoản để quản lý phòng và hồ sơ cá nhân.</p>
        </header>

        <main>
            <section class="auth-card">
                <div class="social-login">
                    <button class="social-button google">Đăng ký với Google</button>
                    <button class="social-button facebook">Đăng ký với Facebook</button>
                </div>

                <div class="separator"><span>hoặc</span></div>

                <form class="register-form">
                    <label class="form-field">
                        Username
                        <input type="text" placeholder="Username của bạn">
                    </label>
                    <label class="form-field">
                        Email
                        <input type="email" placeholder="user@example.com">
                    </label>
                    <label class="form-field">
                        Mật khẩu
                        <input type="password" placeholder="Mật khẩu">
                    </label>
                    <label class="form-field">
                        Xác nhận mật khẩu
                        <input type="password" placeholder="Nhập lại mật khẩu">
                    </label>
                    <button class="button primary" type="submit">Đăng ký</button>
                </form>
            </section>
        </main>

        <footer>
            <p>Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
        </footer>
    </div>
</body>
</html>
